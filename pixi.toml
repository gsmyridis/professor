[workspace]
authors = ["gsmyridis <georgesmyr@icloud.com>"]
channels = [
  "https://conda.modular.com/max-nightly",
  "https://conda.modular.com/max",
  "conda-forge"
]
name = "professor"
platforms = ["osx-arm64"]
version = "0.1.0"

[tasks]
format = "mojo format ."
test-apple = """
    mojo run -I src tests/apple/test_database.mojo &
    mojo run -I src tests/apple/test_config.mojo &
    mojo run -I src tests/apple/test_event.mojo &
    mojo run -I src tests/apple/ffi/test_kperf_data_layout.mojo
"""

[dependencies]
mojo = ">=1.0.0b3.dev2026070806,<2"

[feature.examples.dependencies]
mojo = "==1.0.0b3.dev2026070806"
numpy = ">=2.3.3,<3"
python = ">=3.13,<3.15"

[feature.examples.tasks]
haversine-calculate = "python examples/haversine/gendata.py calculate"
haversine-generate = "python examples/haversine/gendata.py generate 100000 --output examples/haversine/data/pairs.json"
haversine-profile = """
    mojo run -I src -I examples/haversine/parser examples/haversine/main.mojo examples/haversine/data/pairs.json
"""
haversine-test-parser = """
    mojo run -I src -I examples/haversine/parser examples/haversine/test_parser.mojo
"""

[environments]
examples = ["examples"]
