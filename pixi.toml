[workspace]
authors = ["gsmyridis <georgesmyr@icloud.com>"]
channels = [
  "https://conda.modular.com/max-nightly",
  "https://conda.modular.com/max",
  "conda-forge"
]
name = "professor"
platforms = ["osx-arm64"]
version = "0.1.0"

[tasks]
format = "mojo format ."
main = "mojo run -I src examples/main.mojo"
test-apple = """
    mojo run -I src tests/apple/test_database.mojo &
    mojo run -I src tests/apple/test_config.mojo &
    mojo run -I src tests/apple/test_event.mojo &
    mojo run -I src tests/apple/ffi/test_kperf_data_layout.mojo
"""

[dependencies]
mojo = ">=1.0.0b3.dev2026070206,<2"
